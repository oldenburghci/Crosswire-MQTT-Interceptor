# --- researcher frontend ---
compile-researcher-frontend:
  stage: compile
  image: node:20.11-alpine3.18
  tags:
    - lab
  rules:
    - changes:
       - representation/researcher_frontend/**/*
  script:
    - apk update
    - cd representation/researcher_frontend
    - npm install --save
    - npm run build
  artifacts:
    name: "web"
    expire_in: 1 day
    paths:
      - representation/researcher_frontend/dist/

build-container-researcher-frontend:
  stage:
    build-container
  image: quay.io/containers/podman:v5
  tags:
    - lab
