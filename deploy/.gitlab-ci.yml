stages:
#  - test
  - compile
  - build-container

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE
  GOPRIVATE: gitlab.offis.de
# --- api-gateway ---
compile-gateway:
  stage: compile
  image: golang:alpine
  tags:
    - lab
  rules:
    - changes:
       - middleware/gateway/**/*
  script:
    - echo $GOPRIVATE
    - echo "machine gitlab.offis.de" >> ~/.netrc
    - echo "login $CI_REGISTRY_USER" >> ~/.netrc
    - echo "password $CI_REGISTRY_PASSWORD" >> ~/.netrc
#    - cat ~/.netrc
    - apk update && apk add alpine-sdk
    - cd middleware/gateway/cmd
    - go get -v
    - cd ..
    - go build -o dist/main cmd/main.*go
  artifacts:
    expire_in: 1 day
    paths:
      - middleware/gateway/dist/

build-api-gateway:
  stage: build-container
  image: quay.io/containers/podman:v5
  tags:
    - lab
  rules:
    - changes:
        - middleware/gateway/**/*
  needs:
    - job: compile-gateway
      artifacts: true
  artifacts:
    expire_in: 1 day
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_FORMAT: docker
    BUILDAH_ISOLATION: chroot
  script:
    - sed -i "s/<cert_dir>/\/srv\/config\/certs/g" deploy/create-cert.sh
    - sed -i "s/<cert_file>/\/srv\/config\/certs\/cert.pem/g" deploy/create-cert.sh
    - sed -i "s/<key_file>/\/srv\/config\/certs\/key.pem/g" deploy/create-cert.sh
    - mv deploy/create-cert.sh middleware/gateway/create-cert.sh
    - echo "Start container build for $IMAGE_TAG/gateway:$CI_COMMIT_REF_SLUG"
    - podman login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - podman build -t $IMAGE_TAG/gateway:$CI_COMMIT_REF_SLUG -f deploy/gateway.containerfile middleware/gateway
    - podman push $IMAGE_TAG/gateway:$CI_COMMIT_REF_SLUG
    - podman logout $CI_REGISTRY
