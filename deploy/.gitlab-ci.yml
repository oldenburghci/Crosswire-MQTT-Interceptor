  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_FORMAT: docker
    BUILDAH_ISOLATION: chroot
  artifacts:
    expire_in: 1 day
  script:
    - sed -i "s/<cert_dir>/\/usr\/local\/nginx\/conf/g" deploy/create-cert.sh
    - sed -i "s/<cert_file>/\/usr\/local\/nginx\/conf\/cert.pem/g" deploy/create-cert.sh
