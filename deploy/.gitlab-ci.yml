#--- Experimental Artifacts Baseline ---
compile-experiment-ui-baseline:
  stage: compile
  image: node:20.11-alpine3.18
  tags:
    - lab
  rules:
    - changes:
       - experiment-ui/home-assistance-ui/**/*
  script:
    - apk update
    - cd experiment-ui/home-assistance-ui
    - npm install
    - sed -i "s/TEMPLATE/BaselineUI/g" App-template.tsx
    - mv App-template.tsx src/App.tsx
    - npm run build-vite
  artifacts:
    name: "web-baseline"
    expire_in: 1 day
